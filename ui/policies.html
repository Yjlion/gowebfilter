<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="doc.policies">Policies — WebFilter Proxy</title>
  <link rel="stylesheet" href="tailwind.css" />
  <link rel="stylesheet" href="theme.css" />
  <script src="chrome.js"></script>
  <script src="i18n.js"></script>
  <script defer src="alpine.min.js"></script>
</head>
<body class="bg-canvas min-h-screen" x-data="policiesPage()" x-init="init()">

    <!-- Sidebar -->
    <aside class="wf-sidebar w-56 bg-sidebar text-sidebar-ink flex flex-col flex-shrink-0">

              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>

      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sidebar-muted hover:bg-sidebar-active hover:text-sidebar-ink text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a href="policies.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-sidebar-active text-sidebar-ink text-sm font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span data-i18n="nav.policies">Policies</span>
        </a>
        <a href="logs.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sidebar-muted hover:bg-sidebar-active hover:text-sidebar-ink text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span data-i18n="nav.logs">Logs</span>
        </a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sidebar-muted hover:bg-sidebar-active hover:text-sidebar-ink text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          <span data-i18n="nav.analytics">Analytics</span>
        </a>
        <a href="tools.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sidebar-muted hover:bg-sidebar-active hover:text-sidebar-ink text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"/></svg>
          <span data-i18n="nav.tools">Tools</span>
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sidebar-muted hover:bg-sidebar-active hover:text-sidebar-ink text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span data-i18n="nav.settings">Settings</span>
        </a>
        <a href="advanced.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sidebar-muted hover:bg-sidebar-active hover:text-sidebar-ink text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/></svg>
          <span data-i18n="nav.advanced">Advanced</span>
        </a>
      </nav>
      <div class="px-3 py-4 border-t border-sidebar-border space-y-2">
        <label class="block px-3">
          <span class="text-xs text-sidebar-muted" data-i18n="lang.label">Language</span>
          <select class="wf-lang-select mt-1 w-full bg-sidebar-active text-sidebar-ink text-xs rounded px-2 py-1 border border-sidebar-border focus:outline-none"></select>
        </label>
        <button x-show="authEnabled" x-cloak @click="logout()" class="flex items-center gap-2 text-xs text-sidebar-muted hover:text-sidebar-ink transition-colors px-3 py-2 w-full">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span data-i18n="nav.signOut">Sign out</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-auto">
      <div class="px-8 py-6">
        <div class="mb-6 flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-bold text-gray-900" data-i18n="pol.title">Policies</h1>
            <p class="text-sm text-gray-500 mt-1" data-i18n="pol.subtitle">Filtering rules applied by source IP address</p>
          </div>
          <a href="policy-editor.html?action=new"
             class="inline-flex items-center gap-1 px-3 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span data-i18n="dash.newPolicy">New Policy</span>
          </a>
        </div>

        <div class="bg-card rounded-xl shadow-sm border border-gray-100">
          <div x-show="policies.length === 0" class="px-6 py-12 text-center text-gray-400 text-sm" data-i18n-html="pol.none">
            No policies yet. <a href="policy-editor.html?action=new" class="text-blue-600 hover:underline">Create your first policy</a>.
          </div>
          <div x-show="policies.length > 0" class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-100 text-left">
                  <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase" data-i18n="th.name">Name</th>
                  <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase" data-i18n="th.sourceIps">Source IPs</th>
                  <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase" data-i18n="th.activeFilters">Active Filters</th>
                  <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="policy in policies" :key="policy.name">
                  <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-3 font-medium text-gray-900">
                      <a :href="'policy-editor.html?name=' + encodeURIComponent(policy.name)" class="hover:text-blue-600" x-text="policy.name"></a>
                    </td>
                    <td class="px-6 py-3 text-gray-500">
                      <template x-if="policy.source_ips.length === 0"><span class="text-gray-400 italic" x-text="$t('common.catchAll')"></span></template>
                      <template x-if="policy.source_ips.length > 0">
                        <span class="font-mono text-xs" x-text="policy.source_ips.slice(0,2).join(', ') + (policy.source_ips.length > 2 ? ' +' + (policy.source_ips.length-2) : '')"></span>
                      </template>
                    </td>
                    <td class="px-6 py-3">
                      <div class="flex flex-wrap gap-1">
                        <template x-if="policy.inactive"><span class="badge bg-gray-200 text-gray-600" data-i18n="pol.inactive">Inactive</span></template>
                        <template x-if="policy.schedule && policy.schedule.enabled"><span class="badge bg-indigo-100 text-indigo-700" data-i18n="pol.scheduled">Scheduled</span></template>
                        <template x-if="policy.url_filter.enabled"><span class="badge bg-blue-100 text-blue-700">URL</span></template>
                        <template x-if="policy.doh.enabled"><span class="badge bg-purple-100 text-purple-700">DOH</span></template>
                        <template x-if="policy.safesearch.enabled"><span class="badge bg-green-100 text-green-700">SafeSearch</span></template>
                        <template x-if="policy.youtube.enabled"><span class="badge bg-red-100 text-red-700">YouTube</span></template>
                        <template x-if="policy.text_classifier.enabled"><span class="badge bg-yellow-100 text-yellow-700">Text</span></template>
                        <template x-if="policy.image_classifier.enabled"><span class="badge bg-orange-100 text-orange-700">Image</span></template>
                      </div>
                    </td>
                    <td class="px-6 py-3 text-right whitespace-nowrap">
                      <a :href="'policy-editor.html?name=' + encodeURIComponent(policy.name)" class="text-blue-600 hover:text-blue-800 mr-3 text-xs font-medium" x-text="$t('common.edit')"></a>
                      <button @click="clonePolicy(policy)" class="text-gray-500 hover:text-gray-700 mr-3 text-xs font-medium" x-text="$t('common.clone')"></button>
                      <button @click="deletePolicy(policy.name)" class="text-red-500 hover:text-red-700 text-xs font-medium" x-text="$t('common.delete')"></button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function policiesPage() {
      return {
        policies: [],
        authEnabled: false,
        async init() {
          await this.refresh();
          try { this.authEnabled = (await fetch('/api/auth-status').then(r => r.json())).enabled; } catch (e) {}
        },
        async refresh() {
          try { this.policies = await fetch('/api/policies').then(r => r.json()); }
          catch (e) { console.error(e); }
        },
        async deletePolicy(name) {
          if (!confirm(window.wfT('pol.confirmDelete').replace('{name}', name))) return;
          await fetch(`/api/policies/${encodeURIComponent(name)}`, { method: 'DELETE' });
          await this.refresh();
        },
        async clonePolicy(policy) {
          const copy = JSON.parse(JSON.stringify(policy));
          let base = policy.name + '-copy', name = base, n = 2;
          const names = this.policies.map(p => p.name);
          while (names.includes(name)) name = base + n++;
          copy.name = name;
          copy.source_ips = [];  // avoid duplicate IP routing
          await fetch('/api/policies', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(copy),
          });
          await this.refresh();
        },
        async logout() { await fetch('/api/logout', { method: 'POST' }); location.href = 'login.html'; },
      };
    }
  </script>
</body>
</html>
