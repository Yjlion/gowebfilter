name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  # Cross-compile matrix for the three release targets. CGO is disabled here
  # deliberately: through Phase 6 the whole tree is pure Go, so this catches
  # any accidental CGO dependency creeping in early. Once the ONNX image
  # classifier lands (Phase 7), this job gains a CGO_ENABLED=1 + zig-cc
  # variant per docs/build.md rather than replacing this one, so the
  # noonnx build tag keeps a pure-Go cross-compile path verified.
  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -tags noonnx -o /dev/null ./cmd/webfilter

  # Runs only on a `v*` tag push: builds all three release targets (via the
  # same script a maintainer would run locally, scripts/package-release.sh -
  # see packaging/README.md) and attaches the resulting archives to a GitHub
  # release for that tag.
  release:
    needs: [test, cross-compile]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git describe` resolves the tag
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: ./scripts/package-release.sh "${{ github.ref_name }}" dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
