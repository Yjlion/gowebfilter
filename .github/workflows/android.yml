name: Android APK

# Runs on demand from the Actions tab, and as a reusable workflow from
# ci.yml's release job (v* tags) so every GitHub release ships the APK.
# The debug APK and the gomobile AAR are uploaded as artifacts either way.
on:
  workflow_dispatch:
  workflow_call:

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.3.11579264"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # AGP 8.5 requires JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # The runner image ships the Android SDK at $ANDROID_HOME; pin the NDK
      # version explicitly so gomobile builds are reproducible across image
      # updates.
      - name: Install pinned NDK
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      # No @latest: installing from inside the module resolves gomobile and
      # gobind to the go.mod-pinned x/mobile version (present via the `tool`
      # directive), so the binaries can't drift ahead of the module graph.
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile golang.org/x/mobile/cmd/gobind
          gomobile init

      # android/amd64 (emulators) needs modernc.org/libc's legacy syscalls
      # remapped to the *at family or Android's seccomp SIGSYS-kills the app
      # on the first sqlite open. The script copies+patches libc and adds a
      # go.mod replace; see scripts/patch_libc_seccomp.go for the story.
      - name: Patch modernc.org/libc for Android x86_64 seccomp
        run: go run scripts/patch_libc_seccomp.go

      # Same command android/README.md documents for local builds.
      - name: Build webfilter.aar
        run: |
          gomobile bind -target=android/arm64,android/arm,android/amd64 -androidapi 26 \
            -o android/app/libs/webfilter.aar ./mobile

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: webfilter-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: webfilter-aar
          path: android/app/libs/webfilter.aar
          if-no-files-found: error
